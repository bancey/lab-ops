---
- name: Install scanner stack packages
  ansible.builtin.apt:
    pkg:
      - sane-utils
      - scanbd
      - img2pdf
      - curl
      - jq
    state: present
    update_cache: true

- name: Validate Paperless API token is provided
  ansible.builtin.assert:
    that:
      - paperless_api_token | length > 0
    fail_msg: "paperless_api_token must be provided (e.g., via lookup('ansible.builtin.file', 'Paperless-API-Token'))"

- name: Configure SANE dll.conf to use net backend only (required for scanbd proxy mode)
  ansible.builtin.copy:
    dest: /etc/sane.d/dll.conf
    owner: root
    group: root
    mode: '0644'
    content: |
      # Managed by Ansible (scansnap-paperless role)
      # scanbd requires SANE clients to go through its net proxy.
      # The fujitsu backend is configured in /etc/scanbd/ for scanbd's internal use.
      net
  notify:
    - restart scanbd

- name: Configure SANE net.conf for scanbd proxy (localhost + connect_timeout)
  ansible.builtin.copy:
    dest: /etc/sane.d/net.conf
    owner: root
    group: root
    mode: '0644'
    content: |
      # Managed by Ansible (scansnap-paperless role)
      connect_timeout = 3
      localhost
  notify:
    - restart scanbd

- name: Ensure /etc/scanbd/ has the fujitsu backend for scanbd direct access
  ansible.builtin.copy:
    dest: /etc/scanbd/dll.conf
    owner: root
    group: root
    mode: '0644'
    content: |
      # Managed by Ansible (scansnap-paperless role)
      # Full backend list used by scanbd internally (SANE_CONFIG_DIR=/etc/scanbd)
      fujitsu
  notify:
    - restart scanbd

- name: Ensure /etc/scanbd/net.conf exists with connect_timeout
  ansible.builtin.copy:
    dest: /etc/scanbd/net.conf
    owner: root
    group: root
    mode: '0644'
    content: |
      # Managed by Ansible (scansnap-paperless role)
      connect_timeout = 3
  notify:
    - restart scanbd

- name: Create scansnap runtime directories
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
  loop:
    - path: "{{ scansnap_spool_dir }}"
      owner: "{{ scanbd_user }}"
      group: "{{ scanbd_group }}"
      mode: "0775"
    - path: "{{ scansnap_output_dir }}"
      owner: "{{ scanbd_user }}"
      group: "{{ scanbd_group }}"
      mode: "0775"
    - path: "{{ scansnap_log_dir }}"
      owner: "{{ scanbd_user }}"
      group: "{{ scanbd_group }}"
      mode: "0775"
    - path: "{{ scanbd_script_dir }}"
      owner: "root"
      group: "root"
      mode: "0755"
    - path: "{{ scansnap_token_file | dirname }}"
      owner: "root"
      group: "{{ scanbd_group }}"
      mode: "0750"

- name: Pre-create log file with correct permissions
  ansible.builtin.file:
    path: "{{ scansnap_log_file }}"
    state: touch
    owner: "{{ scanbd_user }}"
    group: "{{ scanbd_group }}"
    mode: '0664'

- name: Deploy Paperless API token environment file
  ansible.builtin.template:
    src: paperless-api-token.env.j2
    dest: "{{ scansnap_token_file }}"
    owner: root
    group: "{{ scanbd_group }}"
    mode: '0640'
- name: Deploy scan-to-paperless script
  ansible.builtin.template:
    src: scan-to-paperless.sh.j2
    dest: "{{ scansnap_script_dir }}/scan-to-paperless.sh"
    owner: root
    group: root
    mode: '0755'

- name: Symlink scan-to-paperless script into scanbd scripts directory
  ansible.builtin.file:
    src: "{{ scansnap_script_dir }}/scan-to-paperless.sh"
    dest: "{{ scanbd_script_dir }}/scan.sh"
    state: link

- name: Deploy scanbd configuration
  ansible.builtin.template:
    src: scanbd.conf.j2
    dest: /etc/scanbd/scanbd.conf
    owner: root
    group: root
    mode: '0644'
  notify:
    - restart scanbd

- name: Deploy scanbd default environment variables
  ansible.builtin.copy:
    dest: /etc/default/scanbd
    owner: root
    group: root
    mode: '0644'
    content: |
      # Environment variables for scanbd
      # Sourced by /etc/init.d/scanbd
      # scanbd uses /etc/scanbd/ for its internal SANE config (direct backend access)
      export SANE_CONFIG_DIR=/etc/scanbd
  notify:
    - restart scanbd

- name: Flush handlers before starting scanbd
  ansible.builtin.meta: flush_handlers

- name: Enable and start scanbd service
  ansible.builtin.systemd:
    name: scanbd
    enabled: "{{ scansnap_service_enabled | bool }}"
    state: "{{ 'started' if (scansnap_service_enabled | bool) else 'stopped' }}"
  when: not ansible_check_mode

- name: Deploy scansnap-retry systemd service unit
  ansible.builtin.template:
    src: scansnap-retry.service.j2
    dest: /etc/systemd/system/scansnap-retry.service
    owner: root
    group: root
    mode: '0644'
  when: scansnap_retry_timer_enabled | bool
  notify:
    - reload systemd daemon

- name: Deploy scansnap-retry systemd timer unit
  ansible.builtin.template:
    src: scansnap-retry.timer.j2
    dest: /etc/systemd/system/scansnap-retry.timer
    owner: root
    group: root
    mode: '0644'
  when: scansnap_retry_timer_enabled | bool
  notify:
    - reload systemd daemon

- name: Flush handlers to reload systemd before enabling timer
  ansible.builtin.meta: flush_handlers

- name: Enable and start scansnap-retry timer
  ansible.builtin.systemd:
    name: scansnap-retry.timer
    enabled: true
    state: started
  when:
    - scansnap_retry_timer_enabled | bool
    - not ansible_check_mode

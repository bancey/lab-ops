---
- name: Create monitoring stack directories
  file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: '0755'
  loop:
    - /opt/stacks
    - /opt/gatus/config
    - /opt/gatus/data
    - /opt/alloy
    - /opt/alloy/config

- name: Copy Gatus configuration template
  template:
    src: "{{ gatus_config_template }}"
    dest: /opt/gatus/config/config.yaml
    owner: root
    group: root
    mode: '0644'

- name: Copy Alloy configuration template
  template:
    src: "{{ alloy_config_template }}"
    dest: /opt/alloy/config/config.alloy
    owner: root
    group: root
    mode: '0644'

- name: Copy monitoring swarm stack template
  template:
    src: "{{ rpi_monitoring_stack_template | default(playbook_dir + '/../stacks/monitoring.stack.yml.j2') }}"
    dest: /opt/stacks/monitoring.stack.yml
    owner: root
    group: root
    mode: '0644'
  run_once: true
  delegate_to: "{{ rpi_swarm_primary_manager_resolved }}"

- name: Validate monitoring swarm stack config
  command: docker stack config -c /opt/stacks/monitoring.stack.yml
  changed_when: false
  run_once: true
  delegate_to: "{{ rpi_swarm_primary_manager_resolved }}"

- name: Deploy monitoring swarm stack
  command: docker stack deploy -c /opt/stacks/monitoring.stack.yml {{ rpi_monitoring_stack_name | default('rpi_monitoring') }}
  register: monitoring_output
  run_once: true
  delegate_to: "{{ rpi_swarm_primary_manager_resolved }}"
  when: not ansible_check_mode

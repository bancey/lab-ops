- name: Setup NUT server on thanos
  hosts: thanos
  become: true
  become_user: root
  become_method: sudo
  gather_facts: true
  roles:
    - role: setup-nut-server
      nut_admin_password: "{{ lookup('ansible.builtin.file', 'NUT-Admin-Password') }}"
      nut_monitor_password: "{{ lookup('ansible.builtin.file', 'NUT-Monitor-Password') }}"

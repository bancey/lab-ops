---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: paperless-gpt
  namespace: paperless-ngx
spec:
  interval: 30m
  dependsOn:
    - name: paperless-ngx
      namespace: paperless-ngx
    - name: ollama
      namespace: ollama
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    defaultPodOptions:
      automountServiceAccountToken: false

    controllers:
      main:
        containers:
          main:
            image:
              repository: icereed/paperless-gpt
              tag: v0.27.0
            env:
              TZ: Europe/London
              PAPERLESS_BASE_URL: "http://paperless-ngx.paperless-ngx.svc.cluster.local:8000"
              LLM_PROVIDER: "ollama"
              LLM_MODEL: "glm-ocr"
              OLLAMA_HOST: "http://ollama.ollama.svc.cluster.local:11434"
              VISION_LLM_PROVIDER: "ollama"
              VISION_LLM_MODEL: "glm-ocr"
              LOG_LEVEL: "info"
              PAPERLESS_API_TOKEN:
                valueFrom:
                  secretKeyRef:
                    name: paperless-gpt-secret
                    key: paperless-api-token
            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                memory: 1Gi
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 8080
                  initialDelaySeconds: 15
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 8080
                  initialDelaySeconds: 10
                  periodSeconds: 15
                  timeoutSeconds: 5
                  failureThreshold: 5
              startup:
                enabled: false

    service:
      main:
        controller: main
        type: ClusterIP
        ports:
          http:
            port: 8080

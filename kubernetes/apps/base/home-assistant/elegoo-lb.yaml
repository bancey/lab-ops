---
apiVersion: v1
kind: Service
metadata:
  name: home-assistant-elegoo-lb
  namespace: home-assistant
  annotations:
    io.cilium/lb-ipam-ips: "10.151.24.12"
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: home-assistant
    app.kubernetes.io/instance: home-assistant
    app.kubernetes.io/controller: main
  ports:
    - name: port-3000
      protocol: TCP
      port: 3000
      targetPort: 3000
    - name: port-3030
      protocol: TCP
      port: 3030
      targetPort: 3030
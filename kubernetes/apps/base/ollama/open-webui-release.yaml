---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: open-webui
  namespace: ollama
spec:
  interval: 30m
  dependsOn:
    - name: ollama
      namespace: ollama
  chart:
    spec:
      chart: app-template
      version: 5.0.0
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    timeout: 20m
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    defaultPodOptions:
      automountServiceAccountToken: false

    controllers:
      main:
        type: statefulset
        containers:
          main:
            image:
              repository: ghcr.io/open-webui/open-webui
              tag: v0.9.5
            env:
              TZ: Europe/London
              OLLAMA_BASE_URL: "http://ollama-main.ollama.svc.cluster.local:11434"
              # Disable embedded OpenAI integration unless configured
              ENABLE_OPENAI_API: "false"
              # Keep auth on; first user becomes admin
              WEBUI_AUTH: "true"
              ENABLE_SIGNUP: "true"
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                memory: 2Gi

    service:
      main:
        controller: main
        type: ClusterIP
        ports:
          http:
            port: 8080

    persistence:
      data:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 5Gi
        storageClass: unas-nfs-csi
        globalMounts:
          - path: /app/backend/data

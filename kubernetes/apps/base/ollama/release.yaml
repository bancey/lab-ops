---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ollama
  namespace: ollama
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    timeout: 20m
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    defaultPodOptions:
      automountServiceAccountToken: false

    controllers:
      main:
        type: statefulset
        containers:
          main:
            image:
              repository: ollama/ollama
              tag: 0.32.3
            env:
              TZ: Europe/London
              OLLAMA_HOST: "0.0.0.0:11434"
              # Constrain concurrency for the small tiny cluster
              OLLAMA_NUM_PARALLEL: "1"
              OLLAMA_MAX_LOADED_MODELS: "1"
              # Keep models in memory for 30m to balance memory/latency
              OLLAMA_KEEP_ALIVE: "30m"
            resources:
              requests:
                cpu: 500m
                memory: 2Gi
              limits:
                memory: 8Gi
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 11434
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 11434
                  initialDelaySeconds: 10
                  periodSeconds: 15
                  timeoutSeconds: 5
                  failureThreshold: 5
              startup:
                enabled: false

    service:
      main:
        controller: main
        type: ClusterIP
        ports:
          http:
            port: 11434

    persistence:
      data:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 30Gi
        storageClass: unas-nfs-csi
        globalMounts:
          - path: /root/.ollama

---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mimir
  namespace: monitoring
spec:
  releaseName: mimir
  chart:
    spec:
      version: 6.0.6
      chart: mimir-distributed
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system
  interval: 30m
  timeout: 15m
  install:
    remediation:
      retries: 3
  values:
    nginx:
      enabled: false
    gateway:
      enabled: true
      enabledNonEnterprise: true
      ingress:
        enabled: true
    mimir:
      structuredConfig:
        limits:
          max_label_names_per_series: 50
          max_label_names_per_info_series: 100
          # Retention policy: keep metrics for 90 days
          compactor_blocks_retention_period: 90d
        compactor:
          # How often compaction runs
          compaction_interval: 10m
          # Deletion delay for safety
          deletion_delay: 2h
        # Use filesystem backend - each StatefulSet component writes to its own PVC
        common:
          storage:
            backend: filesystem
            filesystem:
              dir: /data
    minio:
      enabled: false
    # Persistent volumes for stateful components - storageClass set in cluster overlays
    ingester:
      persistentVolume:
        enabled: true
        size: 10Gi
    storeGateway:
      persistentVolume:
        enabled: true
        size: 5Gi
    compactor:
      persistentVolume:
        enabled: true
        size: 10Gi

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-adguard-dns
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: "Network"
data:
  adguard-dns.json: |-
    {
      "annotations": { "list": [] },
      "editable": true,
      "graphTooltip": 1,
      "links": [],
      "panels": [
        {
          "datasource": { "type": "victoriametrics-metrics-datasource" },
          "fieldConfig": {
            "defaults": { "mappings": [], "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }] } }
          },
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 0 },
          "id": 1,
          "title": "Total DNS Queries (24h)",
          "type": "stat",
          "targets": [{ "expr": "sum(increase(adguard_queries[24h]))" }]
        },
        {
          "datasource": { "type": "victoriametrics-metrics-datasource" },
          "fieldConfig": {
            "defaults": { "mappings": [], "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 10 }, { "color": "red", "value": 25 }] }, "unit": "percentunit" }
          },
          "gridPos": { "h": 4, "w": 6, "x": 6, "y": 0 },
          "id": 2,
          "title": "Block Rate",
          "type": "stat",
          "targets": [{ "expr": "sum(rate(adguard_queries_blocked[1h])) / sum(rate(adguard_queries[1h]))" }]
        },
        {
          "datasource": { "type": "victoriametrics-metrics-datasource" },
          "fieldConfig": {
            "defaults": { "mappings": [], "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }] } }
          },
          "gridPos": { "h": 4, "w": 6, "x": 12, "y": 0 },
          "id": 3,
          "title": "Blocked Queries (24h)",
          "type": "stat",
          "targets": [{ "expr": "sum(increase(adguard_queries_blocked[24h]))" }]
        },
        {
          "datasource": { "type": "victoriametrics-metrics-datasource" },
          "fieldConfig": {
            "defaults": { "mappings": [], "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 50 }, { "color": "red", "value": 100 }] }, "unit": "ms" }
          },
          "gridPos": { "h": 4, "w": 6, "x": 18, "y": 0 },
          "id": 4,
          "title": "Avg Query Duration",
          "type": "stat",
          "targets": [{ "expr": "avg(adguard_dns_query_duration_seconds) * 1000" }]
        },
        {
          "datasource": { "type": "victoriametrics-metrics-datasource" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "axisBorderShow": false, "drawStyle": "line", "fillOpacity": 10, "lineInterpolation": "smooth", "lineWidth": 2, "pointSize": 5, "showPoints": "never", "spanNulls": false, "stacking": { "mode": "none" } },
              "unit": "qps"
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 4 },
          "id": 5,
          "title": "DNS Query Rate by Server",
          "type": "timeseries",
          "targets": [{ "expr": "rate(adguard_queries[5m])", "legendFormat": "{{ server }}" }]
        },
        {
          "datasource": { "type": "victoriametrics-metrics-datasource" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "axisBorderShow": false, "drawStyle": "line", "fillOpacity": 10, "lineInterpolation": "smooth", "lineWidth": 2, "pointSize": 5, "showPoints": "never", "spanNulls": false, "stacking": { "mode": "none" } },
              "unit": "qps"
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 4 },
          "id": 6,
          "title": "Blocked Query Rate by Server",
          "type": "timeseries",
          "targets": [{ "expr": "rate(adguard_queries_blocked[5m])", "legendFormat": "{{ server }}" }]
        },
        {
          "datasource": { "type": "victoriametrics-metrics-datasource" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "axisBorderShow": false, "drawStyle": "line", "fillOpacity": 10, "lineInterpolation": "smooth", "lineWidth": 2, "pointSize": 5, "showPoints": "never", "spanNulls": false, "stacking": { "mode": "none" } },
              "unit": "s"
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 12 },
          "id": 7,
          "title": "Query Duration by Server",
          "type": "timeseries",
          "targets": [{ "expr": "adguard_avg_processing_time_seconds", "legendFormat": "{{ server }}" }]
        }
      ],
      "schemaVersion": 39,
      "tags": ["adguard", "dns", "network"],
      "templating": { "list": [] },
      "time": { "from": "now-24h", "to": "now" },
      "title": "AdGuard DNS",
      "uid": "adguard-dns"
    }

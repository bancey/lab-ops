---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: prometheus-node-exporter
  namespace: monitoring
spec:
  releaseName: prometheus-node-exporter
  chart:
    spec:
      version: 4.55.0
      chart: prometheus-node-exporter
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
  interval: 30m
  timeout: 15m
  install:
    remediation:
      retries: 3
  values:
    service:
      port: 9100
      targetPort: 9100
    affinity: {}
    tolerations:
      - operator: Exists

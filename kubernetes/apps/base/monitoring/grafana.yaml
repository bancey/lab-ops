---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: grafana
  namespace: monitoring
spec:
  releaseName: grafana
  chart:
    spec:
      version: 10.5.15
      chart: grafana
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system
  interval: 30m
  timeout: 15m
  install:
    remediation:
      retries: 3
  values:
    replicas: 1
    admin:
      existingSecret: grafana-admin
      userKey: admin-user
      passwordKey: admin-password
    plugins:
      - victoriametrics-logs-datasource
      - victoriametrics-metrics-datasource
    sidecar:
      dashboards:
        enabled: true
        label: grafana_dashboard
        labelValue: "1"
        folderAnnotation: grafana_folder
        searchNamespace: monitoring
    datasources:
      datasources.yaml:
        apiVersion: 1
        datasources:
          - name: Victoria Logs
            type: victoriametrics-logs-datasource
            url: http://victoria-logs-victoria-logs-single-server.monitoring.svc.cluster.local:9428
            access: proxy
            isDefault: false
          - name: Victoria Metrics
            type: victoriametrics-metrics-datasource
            url: http://victoria-metrics-victoria-metrics-single-server.monitoring.svc.cluster.local:8428
            access: proxy
            isDefault: true
    # Ingress should be configured in cluster overlays
    ingress:
      enabled: false
    # Persistence will be configured with external PVC in cluster overlays
    persistence:
      enabled: false
    resources:
      requests:
        memory: 128Mi
        cpu: 100m
      limits:
        memory: 256Mi
        cpu: 200m
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: loki
  namespace: monitoring
spec:
  releaseName: loki
  chart:
    spec:
      version: 7.0.0
      chart: loki
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system
  interval: 30m
  timeout: 15m
  install:
    remediation:
      retries: 3
  values:
    loki:
      auth_enabled: false
      schemaConfig:
        configs:
          - from: "2024-04-01"
            store: tsdb
            object_store: filesystem
            schema: v13
            index:
              prefix: loki_index_
              period: 24h
      ingester:
        chunk_encoding: snappy
      querier:
        max_concurrent: 4
      pattern_ingester:
        enabled: true
      limits_config:
        allow_structured_metadata: true
        volume_enabled: true
        # Retention policy: keep logs for 30 days
        retention_period: 720h
        # Limit query lookback to retention period
        max_query_lookback: 720h
      ruler:
        enable_api: true
      storage:
        type: filesystem
      # Single binary requires replication_factor 1
      commonConfig:
        replication_factor: 1
    test:
      enabled: false
    lokiCanary:
      enabled: false
    minio:
      enabled: false
    gateway:
      enabled: true
    deploymentMode: SingleBinary
    singleBinary:
      replicas: 1
      # Persistence will be configured with external PVC in cluster overlays
      persistence:
        enabled: false
    # Zero out all distributed replica counts
    ingester:
      replicas: 0
    querier:
      replicas: 0
    queryFrontend:
      replicas: 0
    queryScheduler:
      replicas: 0
    distributor:
      replicas: 0
    compactor:
      replicas: 0
    indexGateway:
      replicas: 0
    bloomPlanner:
      replicas: 0
    bloomBuilder:
      replicas: 0
    bloomGateway:
      replicas: 0
    backend:
      replicas: 0
    read:
      replicas: 0
    write:
      replicas: 0

---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mimir
  namespace: monitoring
spec:
  values:
    gateway:
      enabled: true
      ingress:
        enabled: true
        hosts:
          - host: "mimir.tiny.heimelska.co.uk"
            paths:
              - path: /
                pathType: ImplementationSpecific
        tls:
          - secretName: mimir-tls
            hosts:
              - "mimir.tiny.heimelska.co.uk"
    minio:
      # Credentials stored in SOPS-encrypted secret
      existingSecret: mimir-minio-credentials
      # NFS directories are created as root; run as root so MinIO can write
      securityContext:
        enabled: true
        runAsUser: 0
        runAsGroup: 0
        fsGroup: 0
      persistence:
        enabled: true
        existingClaim: mimir-minio

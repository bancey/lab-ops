---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: victoria-metrics
  namespace: monitoring
spec:
  values:
    server:
      persistentVolume:
        storageClassName: local-path
      extraVolumes:
        - name: vm-backups
          persistentVolumeClaim:
            claimName: victoria-metrics-snapshots
      extraContainers:
        - name: backup
          image: alpine:3.21
          command: ["/bin/sh", "-c"]
          args:
            - |
              apk add --no-cache rsync
              echo "Starting initial backup at $(date)"
              rsync -a --delete /storage/ /backups/
              echo "Initial backup complete at $(date)"
              while true; do
                sleep 21600
                echo "Starting backup at $(date)"
                rsync -a --delete /storage/ /backups/
                echo "Backup complete at $(date)"
              done
          volumeMounts:
            - name: server
              mountPath: /storage
              readOnly: true
            - name: vm-backups
              mountPath: /backups
      securityContext:
        runAsUser: 0
        runAsNonRoot: false
      ingress:
        enabled: true
        hosts:
          - name: "victoria-metrics.tiny.heimelska.co.uk"
            path: /
            port: http
        tls:
          - secretName: victoria-metrics-tls
            hosts:
              - "victoria-metrics.tiny.heimelska.co.uk"

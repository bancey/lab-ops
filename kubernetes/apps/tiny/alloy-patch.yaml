---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: alloy
  namespace: monitoring
spec:
  values:
    controller:
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoExecute
        - key: node-role.kubernetes.io/master
          operator: Exists
          effect: NoExecute
    alloy:
      configMap:
        content: |
          // Discover node-exporter endpoints
          discovery.kubernetes "node_exporter" {
            role = "endpoints"
            namespaces {
              names = ["monitoring"]
            }
            selectors {
              role = "endpoints"
              label = "app.kubernetes.io/name=prometheus-node-exporter"
            }
          }

          // Scrape node-exporter metrics
          prometheus.scrape "node_exporter" {
            targets    = discovery.relabel.node_exporter.output
            forward_to = [prometheus.remote_write.local_mimir.receiver]
            scrape_interval = "15s"
            metrics_path = "/metrics"
            scheme = "http"
            job_name = "node-exporter"
            honor_timestamps = false
            scrape_timeout = "10s"
          }

          // Relabeling for node exporter
          discovery.relabel "node_exporter" {
            targets = discovery.kubernetes.node_exporter.targets

            // Keep only endpoints that are ready
            rule {
              source_labels = ["__meta_kubernetes_endpoint_ready"]
              action = "keep"
              regex = "true"
            }

            // Add cluster label
            rule {
              target_label = "cluster"
              replacement = "tiny"
            }

            // Add unique source identifier
            rule {
              target_label = "alloy_instance"
              replacement = "tiny-alloy"
            }

            // Set instance label to the node name
            rule {
              source_labels = ["__meta_kubernetes_endpoint_node_name"]
              target_label = "instance"
              replacement = "tiny-${1}"
            }
          }

          // Cluster-wide service discovery for pods
          discovery.kubernetes "pods" {
            role = "pod"
          }

          // Scrape application metrics from pods with prometheus annotations
          prometheus.scrape "kubernetes_pods" {
            targets = discovery.relabel.kubernetes_pods.output
            forward_to = [prometheus.remote_write.local_mimir.receiver]
            scrape_interval = "30s"
            job_name = "kubernetes-pods"
            honor_timestamps = false
            scrape_timeout = "25s"
          }

          // Relabeling for pod scraping
          discovery.relabel "kubernetes_pods" {
            targets = discovery.kubernetes.pods.targets

            // Ensure cluster label is consistent
            rule {
              target_label = "cluster"
              replacement = "tiny"
            }

            rule {
              source_labels = ["__meta_kubernetes_pod_annotation_prometheus_io_scrape"]
              action = "keep"
              regex = "true"
            }
            rule {
              source_labels = ["__meta_kubernetes_pod_annotation_prometheus_io_path"]
              action = "replace"
              target_label = "__metrics_path__"
              regex = "(.+)"
            }
            rule {
              source_labels = ["__address__", "__meta_kubernetes_pod_annotation_prometheus_io_port"]
              action = "replace"
              regex = "([^:]+)(?::\\d+)?;(\\d+)"
              replacement = "$1:$2"
              target_label = "__address__"
            }
            rule {
              action = "labelmap"
              regex = "__meta_kubernetes_pod_label_(.+)"
            }
            rule {
              source_labels = ["__meta_kubernetes_namespace"]
              action = "replace"
              target_label = "kubernetes_namespace"
            }
            rule {
              source_labels = ["__meta_kubernetes_pod_name"]
              action = "replace"
              target_label = "kubernetes_pod_name"
            }
          }

          // Service discovery for services
          discovery.kubernetes "services" {
            role = "service"
          }

          // Scrape service metrics
          prometheus.scrape "kubernetes_services" {
            targets = discovery.relabel.kubernetes_services.output
            forward_to = [prometheus.remote_write.local_mimir.receiver]
            scrape_interval = "30s"
            job_name = "kubernetes-services"
            honor_timestamps = false
            scrape_timeout = "25s"
          }

          // Relabeling for service scraping
          discovery.relabel "kubernetes_services" {
            targets = discovery.kubernetes.services.targets

            // Ensure cluster label is consistent
            rule {
              target_label = "cluster"
              replacement = "tiny"
            }

            rule {
              source_labels = ["__meta_kubernetes_service_annotation_prometheus_io_scrape"]
              action = "keep"
              regex = "true"
            }
            rule {
              source_labels = ["__meta_kubernetes_service_annotation_prometheus_io_path"]
              action = "replace"
              target_label = "__metrics_path__"
              regex = "(.+)"
            }
            rule {
              source_labels = ["__address__", "__meta_kubernetes_service_annotation_prometheus_io_port"]
              action = "replace"
              regex = "([^:]+)(?::\\d+)?;(\\d+)"
              replacement = "$1:$2"
              target_label = "__address__"
            }
            rule {
              action = "labelmap"
              regex = "__meta_kubernetes_service_label_(.+)"
            }
            rule {
              source_labels = ["__meta_kubernetes_namespace"]
              action = "replace"
              target_label = "kubernetes_namespace"
            }
            rule {
              source_labels = ["__meta_kubernetes_service_name"]
              action = "replace"
              target_label = "kubernetes_service_name"
            }
          }

          // Remote write to local Victoria Metrics
          prometheus.remote_write "local_mimir" {
            endpoint {
              url = "http://victoria-metrics-victoria-metrics-single-server.monitoring.svc.cluster.local:8428/api/v1/write"

              // Add queue configuration to handle out-of-order samples
              queue_config {
                capacity = 10000
                max_samples_per_send = 2000
                batch_send_deadline = "5s"
                min_shards = 1
                max_shards = 10
                retry_on_http_429 = true
              }

              // Add metadata configuration
              metadata_config {
                send = true
                send_interval = "1m"
              }
            }

            external_labels = {
              cluster = "tiny",
              source = "alloy-tiny",
              alloy_instance = "tiny-cluster",
            }
          }

          // Kubernetes log collection
          discovery.kubernetes "pods_logs" {
            role = "pod"
          }

          // Pod logs collection
          loki.source.kubernetes "pod_logs" {
            targets    = discovery.kubernetes.pods_logs.targets
            forward_to = [loki.write.local_vlogs.receiver]
          }

          // Kubernetes events collection
          loki.source.kubernetes_events "cluster_events" {
            forward_to = [loki.write.local_vlogs.receiver]
          }

          // Remote write to local Victoria Logs
          loki.write "local_vlogs" {
            endpoint {
              url = "http://victoria-logs-victoria-logs-single-server.monitoring.svc.cluster.local:9428/insert/loki/api/v1/push"
            }
            external_labels = {
              cluster = "tiny",
              source = "alloy-tiny",
            }
          }

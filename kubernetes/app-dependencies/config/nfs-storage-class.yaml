---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: config-nfs-csi
provisioner: nfs.csi.k8s.io
parameters:
  server: 10.151.14.15
  share: /mnt/wanda-data/config
reclaimPolicy: Delete
volumeBindingMode: Immediate
mountOptions:
  - nfsvers=4.1
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: nobody-nfs-csi
provisioner: nfs.csi.k8s.io
parameters:
  server: 10.151.14.15
  share: /mnt/wanda-data/nfs-nobody
reclaimPolicy: Delete
volumeBindingMode: Immediate
mountOptions:
  - nfsvers=4.1
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: unas-nfs-csi
provisioner: nfs.csi.k8s.io
parameters:
  server: storage.heimelska.co.uk
  share: /var/nfs/shared/Tiny_K8S
  subDir: ${pvc.metadata.namespace}/${pvc.metadata.name}
mountOptions:
  - nfsvers=4
  - hard
  - nointr
reclaimPolicy: Retain
volumeBindingMode: Immediate
